<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Car Audit — test console</title>
    <style>
      :root {
        --blue: #1a73e8;
        --green: #1e8e3e;
        --red: #d93025;
        --amber: #f29900;
        --ink: #202124;
        --muted: #5f6368;
        --line: #e3e3e6;
        --bg: #f7f8fa;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        color: var(--ink);
        background: var(--bg);
        line-height: 1.5;
      }
      .wrap { max-width: 760px; margin: 0 auto; padding: 48px 20px 80px; }
      h1 {
        text-align: center;
        font-size: 40px;
        font-weight: 500;
        letter-spacing: -0.5px;
        margin: 0 0 4px;
      }
      h1 .a { color: var(--blue); }
      h1 .b { color: var(--green); }
      .tag { text-align: center; color: var(--muted); margin: 0 0 32px; font-size: 14px; }

      .urlbar {
        display: flex; align-items: center; gap: 10px;
        background: #fff; border: 1px solid var(--line);
        border-radius: 999px; padding: 6px 6px 6px 20px;
        box-shadow: 0 1px 6px rgba(32,33,36,0.12);
        transition: box-shadow .15s, border-color .15s;
      }
      .urlbar:focus-within { box-shadow: 0 1px 10px rgba(32,33,36,0.2); border-color: transparent; }
      .urlbar svg { flex: none; color: var(--muted); }
      .urlbar input {
        flex: 1; border: 0; outline: 0; font-size: 16px; background: transparent; padding: 10px 0;
      }

      .card {
        background: #fff; border: 1px solid var(--line); border-radius: 14px;
        padding: 20px; margin-top: 20px;
      }
      .card h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .6px; color: var(--muted); margin: 0 0 16px; font-weight: 600; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 18px; }
      @media (max-width: 540px) { .grid { grid-template-columns: 1fr; } }
      .field { display: flex; flex-direction: column; gap: 5px; }
      .field.wide { grid-column: 1 / -1; }
      label { font-size: 12.5px; color: var(--muted); font-weight: 500; }
      input.f, select.f {
        font-size: 14px; padding: 9px 11px; border: 1px solid var(--line);
        border-radius: 8px; outline: 0; background: #fff; color: var(--ink); width: 100%;
      }
      input.f:focus, select.f:focus { border-color: var(--blue); }

      .actions { display: flex; justify-content: center; margin-top: 24px; }
      button.audit {
        background: var(--blue); color: #fff; border: 0; border-radius: 999px;
        font-size: 16px; font-weight: 500; padding: 13px 40px; cursor: pointer;
        transition: filter .15s, transform .05s;
      }
      button.audit:hover { filter: brightness(1.05); }
      button.audit:active { transform: translateY(1px); }
      button.audit:disabled { opacity: .55; cursor: default; }

      details.settings { margin-top: 14px; }
      details.settings summary { cursor: pointer; color: var(--muted); font-size: 13px; text-align: center; list-style: none; }
      details.settings summary::-webkit-details-marker { display: none; }
      details.settings .row { margin-top: 12px; }

      /* results */
      #status { text-align: center; color: var(--muted); margin-top: 24px; min-height: 20px; }
      #status.error { color: var(--red); }
      #result { margin-top: 20px; display: none; }
      .verdict { display: flex; align-items: center; gap: 20px; }
      .ring {
        flex: none; width: 96px; height: 96px; border-radius: 50%;
        display: grid; place-items: center; position: relative;
      }
      .ring::before {
        content: ""; position: absolute; inset: 10px; background: #fff; border-radius: 50%;
      }
      .ring .num { position: relative; font-size: 26px; font-weight: 600; }
      .verdict .meta { flex: 1; }
      .badge {
        display: inline-block; font-size: 12px; font-weight: 600; padding: 3px 10px;
        border-radius: 999px; text-transform: uppercase; letter-spacing: .4px;
      }
      .verdict .summary { margin: 8px 0 0; color: var(--ink); }

      .flags h3 { font-size: 13px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin: 22px 0 10px; }
      .item {
        border: 1px solid var(--line); border-left-width: 4px; border-radius: 8px;
        padding: 10px 12px; margin-bottom: 8px;
      }
      .item .t { font-weight: 600; font-size: 14px; }
      .item .d { font-size: 13.5px; color: var(--muted); margin-top: 2px; }
      .item.green { border-left-color: var(--green); }
      .item.red { border-left-color: var(--red); }
      .item.watch { border-left-color: var(--amber); }
      .sev { font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 999px; margin-left: 8px; vertical-align: middle; }
      .sev.low { background: #fef7e0; color: #b06000; }
      .sev.medium { background: #fde9e6; color: #b3261e; }
      .sev.high { background: var(--red); color: #fff; }
      .hist { display: inline-block; font-size: 11.5px; font-weight: 600; color: #7a4f01; background: #fff4d6; padding: 2px 9px; border-radius: 999px; margin-top: 6px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1><span class="a">Car</span> <span class="b">Audit</span></h1>
      <p class="tag">Paste a listing URL, set your profile, and run an AI audit.</p>

      <div class="urlbar">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input id="url" type="url" placeholder="https://www.donedeal.ie/cars-for-sale/..." autocomplete="off" />
      </div>

      <div class="card">
        <h2>Your profile</h2>
        <div class="grid">
          <div class="field"><label for="budgetMax">Max budget (€)</label><input id="budgetMax" class="f" type="number" min="0" placeholder="30000" /></div>
          <div class="field"><label for="financePerMonthMax">Max finance / month (€)</label><input id="financePerMonthMax" class="f" type="number" min="0" placeholder="610" /></div>
          <div class="field">
            <label for="fuel">Fuel</label>
            <select id="fuel" class="f">
              <option value="">Any</option><option>petrol</option><option>diesel</option><option>hybrid</option><option>ev</option>
            </select>
          </div>
          <div class="field">
            <label for="transmission">Transmission</label>
            <select id="transmission" class="f">
              <option value="">Any</option><option>automatic</option><option>manual</option>
            </select>
          </div>
          <div class="field"><label for="maxMileageKm">Max mileage (km)</label><input id="maxMileageKm" class="f" type="number" min="0" placeholder="130000" /></div>
          <div class="field"><label for="minYear">Earliest year</label><input id="minYear" class="f" type="number" min="1990" placeholder="2018" /></div>
          <div class="field wide"><label for="use">Intended use</label><input id="use" class="f" type="text" placeholder="family commuting" /></div>
          <div class="field wide"><label for="mustHaves">Must-haves (comma separated)</label><input id="mustHaves" class="f" type="text" placeholder="Apple CarPlay, heated seats" /></div>
          <div class="field wide"><label for="dealBreakers">Deal-breakers (comma separated)</label><input id="dealBreakers" class="f" type="text" placeholder="cat write-off, timing belt due" /></div>
          <div class="field wide"><label for="notes">Other notes</label><input id="notes" class="f" type="text" placeholder="prefer a dealer with good reviews" /></div>
        </div>

        <details class="settings">
          <summary>API key &amp; settings</summary>
          <div class="row field">
            <label for="apiKey">X-API-Key (only needed if the server has AUDIT_API_KEY set)</label>
            <input id="apiKey" class="f" type="password" placeholder="paste AUDIT_API_KEY" autocomplete="off" />
          </div>
        </details>

        <div class="actions">
          <button id="go" class="audit">AUDIT</button>
        </div>
      </div>

      <div id="status"></div>
      <div id="result"></div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const KEY_STORE = "carAuditApiKey";

      // remember the API key locally so you only type it once
      $("apiKey").value = localStorage.getItem(KEY_STORE) || "";
      $("apiKey").addEventListener("change", (e) => localStorage.setItem(KEY_STORE, e.target.value.trim()));

      const num = (id) => { const v = $(id).value.trim(); return v === "" ? undefined : Number(v); };
      const str = (id) => { const v = $(id).value.trim(); return v === "" ? undefined : v; };
      const list = (id) => { const v = $(id).value.trim(); return v === "" ? undefined : v.split(",").map((s) => s.trim()).filter(Boolean); };

      function buildProfile() {
        const p = {
          budgetMax: num("budgetMax"),
          financePerMonthMax: num("financePerMonthMax"),
          use: str("use"),
          maxMileageKm: num("maxMileageKm"),
          minYear: num("minYear"),
          transmission: str("transmission"),
          fuel: str("fuel"),
          mustHaves: list("mustHaves"),
          dealBreakers: list("dealBreakers"),
          notes: str("notes"),
        };
        Object.keys(p).forEach((k) => p[k] === undefined && delete p[k]);
        return p;
      }

      const VERDICT = {
        good_fit:             { label: "Good fit",            color: "#1e8e3e" },
        proceed_with_caution: { label: "Proceed with caution", color: "#f29900" },
        avoid:                { label: "Avoid",               color: "#d93025" },
      };

      function setStatus(msg, isError) {
        const el = $("status");
        el.textContent = msg || "";
        el.className = isError ? "error" : "";
      }

      function render(audit) {
        const v = VERDICT[audit.verdict] || { label: audit.verdict, color: "#5f6368" };
        const score = Math.max(0, Math.min(100, Number(audit.score) || 0));

        const items = (arr, cls) => (arr || []).map((f) => `
          <div class="item ${cls}">
            <div class="t">${esc(f.title)}${f.severity ? `<span class="sev ${f.severity}">${f.severity}</span>` : ""}</div>
            <div class="d">${esc(f.detail)}</div>
            ${f.suggestHistoryCheck ? `<div class="hist">🔍 Worth a paid history check</div>` : ""}
          </div>`).join("");

        const section = (title, arr, cls) =>
          (arr && arr.length) ? `<div class="flags"><h3>${title}</h3>${items(arr, cls)}</div>` : "";

        $("result").innerHTML = `
          <div class="card">
            <div class="verdict">
              <div class="ring" style="background: conic-gradient(${v.color} ${score * 3.6}deg, #ececed 0deg);">
                <span class="num">${score}</span>
              </div>
              <div class="meta">
                <span class="badge" style="background:${v.color}22; color:${v.color};">${v.label}</span>
                <p class="summary">${esc(audit.summary || "")}</p>
              </div>
            </div>
            ${section("Green flags", audit.greenFlags, "green")}
            ${section("Red flags", audit.redFlags, "red")}
            ${section("Watch for / ask the seller", audit.watchFor, "watch")}
          </div>`;
        $("result").style.display = "block";
      }

      function esc(s) {
        return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
      }

      async function audit() {
        const url = $("url").value.trim();
        if (!url) { setStatus("Enter a listing URL first.", true); return; }

        $("result").style.display = "none";
        $("go").disabled = true;
        setStatus("Reading the listing and auditing… (first run can take ~20s)");

        try {
          const res = await fetch("/audit", {
            method: "POST",
            headers: { "Content-Type": "application/json", "X-API-Key": $("apiKey").value.trim() },
            body: JSON.stringify({ profile: buildProfile(), url }),
          });
          const data = await res.json();
          if (!res.ok) { setStatus(`Error ${res.status}: ${data.error || "request failed"}`, true); return; }
          setStatus("");
          render(data);
        } catch (err) {
          setStatus("Network error: " + err.message, true);
        } finally {
          $("go").disabled = false;
        }
      }

      $("go").addEventListener("click", audit);
      $("url").addEventListener("keydown", (e) => { if (e.key === "Enter") audit(); });
    </script>
  </body>
</html>
