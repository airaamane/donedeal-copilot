<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="popup.css" />
    <title>DoneDeal Copilot</title>
  </head>
  <body>
    <div class="wrap">
      <header class="head">
        <h1><span class="a">DoneDeal</span> <span class="b">Copilot</span></h1>
        <p class="tag">AI second opinion on the car you're looking at.</p>
      </header>

      <!-- Current page / target listing -->
      <div class="urlbar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7" /><line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input id="url" type="url" placeholder="https://www.donedeal.ie/cars-for-sale/..." autocomplete="off" />
      </div>
      <p id="siteNote" class="note"></p>

      <div class="actions">
        <button id="go" class="audit">AUDIT THIS LISTING</button>
      </div>

      <!-- Buyer profile (persisted) -->
      <details class="panel" id="profilePanel" open>
        <summary>Your profile <span class="chev">▸</span></summary>
        <div class="grid">
          <div class="field"><label for="budgetMax">Max budget (€)</label><input id="budgetMax" class="f" type="number" min="0" placeholder="30000" /></div>
          <div class="field"><label for="financePerMonthMax">Finance/mo (€)</label><input id="financePerMonthMax" class="f" type="number" min="0" placeholder="610" /></div>
          <div class="field">
            <label for="fuel">Fuel</label>
            <select id="fuel" class="f">
              <option value="">Any</option><option>petrol</option><option>diesel</option><option>hybrid</option><option>ev</option>
            </select>
          </div>
          <div class="field">
            <label for="transmission">Transmission</label>
            <select id="transmission" class="f">
              <option value="">Any</option><option>automatic</option><option>manual</option>
            </select>
          </div>
          <div class="field"><label for="maxMileageKm">Max mileage (km)</label><input id="maxMileageKm" class="f" type="number" min="0" placeholder="130000" /></div>
          <div class="field"><label for="minYear">Earliest year</label><input id="minYear" class="f" type="number" min="1990" placeholder="2018" /></div>
          <div class="field wide"><label for="use">Intended use</label><input id="use" class="f" type="text" placeholder="family commuting" /></div>
          <div class="field wide"><label for="mustHaves">Must-haves (comma separated)</label><input id="mustHaves" class="f" type="text" placeholder="Apple CarPlay, heated seats" /></div>
          <div class="field wide"><label for="dealBreakers">Deal-breakers (comma separated)</label><input id="dealBreakers" class="f" type="text" placeholder="cat write-off, timing belt due" /></div>
          <div class="field wide"><label for="notes">Other notes</label><input id="notes" class="f" type="text" placeholder="prefer a dealer with good reviews" /></div>
        </div>
      </details>

      <!-- Advanced (persisted) — most users never open this. -->
      <details class="panel" id="advancedPanel">
        <summary>Advanced <span class="chev">▸</span></summary>
        <label class="check"><input id="sendPageText" type="checkbox" checked /> Send page text (more reliable on AutoTrader UK)</label>
        <div class="field">
          <label for="backendUrl">Backend URL override (for self-hosting / local dev)</label>
          <input id="backendUrl" class="f" type="url" placeholder="leave blank to use the built-in backend" autocomplete="off" />
        </div>
      </details>

      <div id="status"></div>
      <div id="result"></div>

      <footer class="foot">Set your profile once — it's saved on this browser.</footer>
    </div>

    <script src="config.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
